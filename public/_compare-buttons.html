<!doctype html>
<!-- 一時比較ページ（#E ボタン可読性・決定後に削除する）。アプリのルートではない。 -->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ボタン可読性 A/B 比較 — Hanōba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap"
    />
    <style>
      :root {
        --ha-base: #14120d;
        --ha-green: #6cba38; /* 現行の明るい葉緑 */
        --ha-green-deep-bg: #2f6b1e; /* B案: 深緑 */
        --ha-white: #f6f0e6;
        --ha-ink: #ece6da;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(9,8,6,0.84), rgba(13,11,8,0.68) 42%, rgba(9,8,6,0.9)),
          #14120d;
        color: var(--ha-ink);
        font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
        padding: 32px 20px 64px;
      }
      .wrap { max-width: 28rem; margin: 0 auto; }
      h1 { font-family: "Outfit", sans-serif; font-weight: 800; font-size: 1.5rem; color: #aee07f; letter-spacing: -0.01em; }
      p.note { color: rgba(236,230,218,0.6); font-size: 0.85rem; line-height: 1.7; }
      .card {
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 1.25rem;
        padding: 20px;
        margin: 18px 0;
      }
      .label { font-weight: 700; color: #aee07f; margin: 0 0 4px; }
      .sub { color: rgba(236,230,218,0.55); font-size: 0.8rem; margin: 0 0 14px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        border: 0; border-radius: 9999px; cursor: pointer;
        padding: 10px 22px; font-weight: 700; font-size: 1rem;
        box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 6px 16px rgba(0,0,0,0.25);
      }
      /* A 案: 明るい葉緑 + 濃い文字 */
      .a { background: var(--ha-green); color: var(--ha-base); }
      /* B 案: 深緑 + 白文字 */
      .b { background: var(--ha-green-deep-bg); color: var(--ha-white); }
      /* 現行（参考・読みにくい例）: 明るい葉緑 + 白文字 */
      .now { background: var(--ha-green); color: var(--ha-white); }
      /* 採用案: 明るい葉緑 + 白文字 + 濃い緑の影（鮮やかさを保ちつつ可読性） */
      .shadow {
        background: var(--ha-green);
        color: var(--ha-white);
        text-shadow: 0 1px 1.5px rgba(8,30,4,0.7), 0 0 2px rgba(8,30,4,0.55);
      }
      svg { width: 18px; height: 18px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ボタン可読性 A / B 比較</h1>
      <p class="note">同じ暗いガラス背景の上で見比べてください。スマホで開くのが本番に近いです。</p>

      <div class="card">
        <p class="label">採用案：明るい葉緑＋白文字＋濃い緑の影</p>
        <p class="sub">背景 #6cba38 ＋ 白文字 ＋ text-shadow（濃緑）。鮮やかさを保ちつつ縁取りで読みやすく。</p>
        <div class="row">
          <button class="btn shadow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
            探す
          </button>
          <button class="btn shadow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"/><path d="M12 14c0-3.3-2.7-6-6-6 0 3.3 2.7 6 6 6Z"/><path d="M12 14c0-3.3 2.7-6 6-6 0 3.3-2.7 6-6 6Z"/></svg>
            投稿する
          </button>
        </div>
      </div>

      <div class="card">
        <p class="label">A案：明るい葉緑のまま、文字を濃く</p>
        <p class="sub">背景 #6cba38 ＋ 文字 #14120d（コントラスト ≈ 8.5）</p>
        <div class="row">
          <button class="btn a">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
            探す
          </button>
          <button class="btn a">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"/><path d="M12 14c0-3.3-2.7-6-6-6 0 3.3 2.7 6 6 6Z"/><path d="M12 14c0-3.3 2.7-6 6-6 0 3.3-2.7 6-6 6Z"/></svg>
            投稿する
          </button>
        </div>
      </div>

      <div class="card">
        <p class="label">B案：深緑にして白文字を維持</p>
        <p class="sub">背景 #2f6b1e ＋ 文字 #f6f0e6（コントラスト ≈ 5.5）</p>
        <div class="row">
          <button class="btn b">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
            探す
          </button>
          <button class="btn b">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"/><path d="M12 14c0-3.3-2.7-6-6-6 0 3.3 2.7 6 6 6Z"/><path d="M12 14c0-3.3 2.7-6 6-6 0 3.3-2.7 6-6 6Z"/></svg>
            投稿する
          </button>
        </div>
      </div>

      <div class="card">
        <p class="label">現行（参考・読みにくい例）</p>
        <p class="sub">背景 #6cba38 ＋ 文字 #f6f0e6（コントラスト ≈ 2.0）</p>
        <div class="row">
          <button class="btn now">探す</button>
          <button class="btn now">投稿する</button>
        </div>
      </div>
    </div>
  </body>
</html>
